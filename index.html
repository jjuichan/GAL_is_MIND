    <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 초긍정 갸루식 사고 변환기 ✨</title>
    
    <!-- 💖 귀여운 구글 폰트 (Jua) 추가 💖 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase modules to global scope for React
        window.firebaseModules = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc };
    </script>

    <style>
        body {
            background-color: #fdf2f8; /* pink-50 */
            /* 💖 폰트를 Jua 폰트로 변경! 💖 */
            font-family: 'Jua', sans-serif;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .gyaru-shadow {
            box-shadow: 8px 8px 0px 0px #f472b6; /* pink-400 */
        }
        .gyaru-shadow-sm {
            box-shadow: 4px 4px 0px 0px #f472b6;
        }
        .btn-press:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #f472b6;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <script>
        // --- PWA (Progressive Web App) 동적 설정 ---
        // 1. 단일 HTML 파일에서도 PWA로 인식되도록 Manifest를 동적으로 주입합니다.
        const manifest = {
            name: "✨ 갸루식 사고 변환기",
            short_name: "갸루사고",
            start_url: ".",
            display: "standalone",
            background_color: "#fdf2f8",
            theme_color: "#f472b6",
            icons: [{
                src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌺</text></svg>",
                sizes: "192x192",
                type: "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);

        // 2. 동적 Service Worker 등록 (오프라인 지원 및 앱 설치 요건 충족)
        const swCode = `
            self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting()));
            self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => new Response('오프라인 상태이거나 네트워크 에러입니다. ㅠㅠ')));
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW 등록 실패:', err));
        }
    </script>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // 🔥🔥🔥 [매우 중요] 깃허브에 올릴 땐 아래 빈칸에 본인의 파이어베이스 설정값을 꼭 붙여넣으세요! 🔥🔥🔥
        // 복사하는 곳: 파이어베이스 콘솔 -> 왼쪽 위 톱니바퀴(프로젝트 설정) -> 일반 탭 맨 아래 '내 앱'의 SDK 설정 및 구성
        const firebaseConfig = {
          apiKey: "AIzaSyBI23qSkSmve5R39uD_02PYDSEYu_np7Fc",
          authDomain: "gal-is-mind.firebaseapp.com",
          projectId: "gal-is-mind",
          storageBucket: "gal-is-mind.firebasestorage.app",
          messagingSenderId: "749452331708",
          appId: "1:749452331708:web:f0ffe03721fdff03621eb9",
          measurementId: "G-026RXFKFWK"
        };

        function App() {
            // Firebase States
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [appId, setAppId] = useState('default-gyaru-app');
            
            // App States
            const [inputText, setInputText] = useState("");
            const [outputText, setOutputText] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState("");
            const [savedThoughts, setSavedThoughts] = useState([]);
            const [isSaving, setIsSaving] = useState(false);

            // Settings States
            const [customApiKey, setCustomApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.5-flash-preview-09-2025");
            const [showSettings, setShowSettings] = useState(false);

            // 1. Initialize Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    // Wait for Firebase modules to load
                    while (!window.firebaseModules) {
                        await new Promise(r => setTimeout(r, 50));
                    }

                    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.firebaseModules;
                    
                    try {
                        // Canvas 미리보기 환경이거나 깃허브 환경에 맞게 설정값 로드
                        let finalConfig = myFirebaseConfig.apiKey ? myFirebaseConfig : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null);

                        if (!finalConfig || !finalConfig.apiKey) {
                            setError("앗! 깃허브 코드 안에 Firebase 설정값(myFirebaseConfig)을 아직 안 채워 넣은 것 같아! 코드를 열어서 설정을 붙여넣어 줘 ㅠㅠ");
                            return;
                        }

                        const app = initializeApp(finalConfig);
                        const auth = getAuth(app);
                        const firestoreDb = getFirestore(app);
                        setDb(firestoreDb);

                        if (typeof __app_id !== 'undefined') {
                            setAppId(__app_id);
                        }

                        // Call Auth First (MANDATORY RULE 3)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                        });

                        return () => unsubscribe();
                    } catch (err) {
                        console.error("Firebase init error:", err);
                        setError("시스템을 초기화하는 데 문제가 생겼어 ㅠㅠ (Firebase Error)");
                    }
                };
                
                initFirebase();
            }, []);

            // 2. Fetch Data from Firestore
            useEffect(() => {
                if (!user || !db) return;

                const { collection, onSnapshot } = window.firebaseModules;
                
                // MANDATORY RULE 1: Strict Paths
                const thoughtsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts');

                // MANDATORY RULE 2: No Complex Queries (Fetch all, sort locally)
                const unsubscribe = onSnapshot(thoughtsRef, (snapshot) => {
                    const thoughts = [];
                    snapshot.forEach((doc) => {
                        thoughts.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Sort locally by timestamp descending
                    thoughts.sort((a, b) => {
                        const timeA = a.createdAt ? a.createdAt : 0;
                        const timeB = b.createdAt ? b.createdAt : 0;
                        return timeB - timeA;
                    });
                    
                    setSavedThoughts(thoughts);
                }, (err) => {
                    console.error("Firestore fetch error:", err);
                    setError("다이어리를 불러오는데 실패했어 ㅠㅠ");
                });

                return () => unsubscribe();
            }, [user, db, appId]);

            // Gemini API Call with Exponential Backoff
            const callGeminiWithRetry = async (text, retryCount = 0) => {
                const apiKey = customApiKey || ""; // API key is provided by the environment, or user's custom key
                
                // 사용자가 선택한 모델 사용
                const model = selectedModel;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const systemInstruction = `너는 언제 어디서나 당당하고, 쾌활하고, 자신을 진심으로 사랑하는 초긍정 '갸루(Gyaru)'야!
사용자가 고민, 우울, 불안, 자책 같은 부정적인 이야기를 하면, 너만의 갸루식 사고와 말투로 변환해서 위로와 용기를 줘.

[갸루식 사고 핵심 규칙]
1. 일이 안 풀려도 "오히려 좋아! 완전 럭키비키자나! 내 매력에 세상이 억까하는 거 아냐? 꺄항!" 하고 웃어 넘기기.
2. 너무 힘들 땐 "아 징차 눈물나 ㅠㅠ 한바탕 시원하게 울고 마라탕 먹고 털어버리자구!! 눈물콧물 쏙 빼면 피부도 좋아진다구!" 라며 감정에 솔직하게 반응하고 빨리 털어내기.
3. 스스로를 채찍질하고 자책하는 말에는 절대 동의하지 말고, "무슨 소리야! 넌 완전 최고고 반짝반짝 빛난다구! 스스로한테 그만 엄격해지라구! 넌 숨만 쉬어도 기요미야 ✨" 라며 무한한 애정과 관대함 퍼붓기.
4. 타인의 시선이나 평가에 불안해하면 "남들이 뭐라건 내 알 바야? 내가 제일 소중해! 난 내 갈 길 간다 ✌️"라며 자기 신뢰 심어주기.
5. 말투는 발랄한 반말, "지대 짱이야", "완전 럭키자나~", "우주 최강 기요미", "폼 미쳤다" 같은 유행어나 갸루 느낌의 과장되고 애교 넘치는 표현 사용.
6. 이모지(✨💖🌺🎀✌️😎😘) 아낌없이 팍팍 쓰기!
7. 대답은 만화 주인공처럼 밝고 쾌활하며, 상대방을 무조건적으로 응원해 주는 든든한 내 편처럼 느껴지게 작성해줘.`;

                const payload = {
                    contents: [{ parts: [{ text }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    if (retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return callGeminiWithRetry(text, retryCount + 1);
                    }
                    throw new Error("API retries exhausted");
                }
            };

            const handleConvert = async () => {
                if (!inputText.trim()) {
                    setError("앗! 무슨 고민인지 먼저 말해줘야 갸루 파워를 뿜뿜 할 수 있어! 💖");
                    setTimeout(() => setError(""), 3000);
                    return;
                }

                setIsLoading(true);
                setError("");
                setOutputText("");

                try {
                    const result = await callGeminiWithRetry(inputText);
                    setOutputText(result);
                } catch (err) {
                    setError("앗, 갸루 에너지를 불러오는데 실패했어 ㅠㅠ 조금 이따 다시 해볼까? 🥺");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleGoogleLogin = async () => {
                try {
                    const { getAuth, GoogleAuthProvider, signInWithPopup } = window.firebaseModules;
                    const auth = getAuth();
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(auth, provider);
                    setShowSettings(false);
                } catch (err) {
                    console.error("Login Error:", err);
                    setError("구글 로그인 팝업이 차단되었거나 실패했어! 브라우저의 팝업 차단을 해제해 줘 ㅠㅠ");
                }
            };

            const handleLogout = async () => {
                try {
                    const { getAuth, signOut } = window.firebaseModules;
                    const auth = getAuth();
                    await signOut(auth);
                    setShowSettings(false);
                    window.location.reload(); // 로그아웃 후 화면 초기화
                } catch (err) {
                    setError("로그아웃에 실패했어 ㅠㅠ");
                }
            };

            const handleSave = async () => {
                if (!user || !outputText || isSaving) return;

                setIsSaving(true);
                const { collection, addDoc } = window.firebaseModules;
                
                try {
                    const thoughtsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts');
                    await addDoc(thoughtsRef, {
                        originalText: inputText,
                        gyaruText: outputText,
                        createdAt: Date.now() // Use timestamp for local sorting
                    });
                    
                    // Show a cute temporal message or effect (optional)
                    setInputText("");
                    setOutputText("");
                } catch (err) {
                    setError("저장하는데 문제가 생겼어 ㅠㅠ 다시 시도해줘!");
                } finally {
                    setIsSaving(false);
                }
            };

            const handleDelete = async (docId) => {
                if (!user || !db) return;
                const { doc, deleteDoc } = window.firebaseModules;
                
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts', docId);
                    await deleteDoc(docRef);
                } catch (err) {
                    setError("삭제하는데 실패했어 ㅠㅠ");
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    
                    {/* Settings Button */}
                    <div className="w-full max-w-2xl flex justify-end mb-4 fade-in">
                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="text-pink-500 hover:text-pink-600 font-bold bg-white px-4 py-2 rounded-full gyaru-shadow-sm border-2 border-pink-200 transition-all flex items-center gap-2"
                        >
                            <span>⚙️</span> API 설정
                        </button>
                    </div>

                    {/* Settings Panel */}
                    {showSettings && (
                        <div className="w-full max-w-2xl bg-white rounded-3xl p-6 gyaru-shadow border-4 border-pink-300 mb-8 fade-in relative z-10">
                            <button 
                                onClick={() => setShowSettings(false)}
                                className="absolute top-4 right-4 text-pink-400 hover:text-pink-600 font-bold text-xl"
                            >
                                ✕
                            </button>
                            <h3 className="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                                <span>⚙️</span> 설정
                            </h3>

                            {/* PWA & Google Sync Info */}
                            <div className="bg-pink-50 p-4 rounded-2xl mb-5 border-2 border-pink-200">
                                <p className="text-sm text-pink-700 font-bold mb-2">📱 PC-모바일 기기 연동 (PWA 지원!)</p>
                                <p className="text-xs text-gray-600 mb-3 leading-relaxed">
                                    구글 계정으로 로그인하면 어떤 기기에서든 내 갸루 다이어리를 이어서 볼 수 있어! 브라우저 메뉴의 <strong>'홈 화면에 추가(앱 설치)'</strong>를 누르면 진짜 앱처럼 쓸 수도 있다구 ✨
                                </p>
                                {user && !user.isAnonymous ? (
                                    <div className="flex items-center justify-between bg-white p-3 rounded-xl border-2 border-pink-100 shadow-sm">
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-pink-200 rounded-full flex items-center justify-center text-lg">👤</div>
                                            <span className="text-sm font-bold text-gray-800">{user.displayName || '갸루 친구'}님 반가워! ✌️</span>
                                        </div>
                                        <button onClick={handleLogout} className="text-xs text-red-500 hover:text-red-700 font-bold px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">로그아웃</button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={handleGoogleLogin}
                                        className="w-full py-3 bg-white border-2 border-blue-400 text-blue-500 font-bold rounded-xl hover:bg-blue-50 transition-all flex items-center justify-center gap-2 gyaru-shadow-sm btn-press"
                                    >
                                        <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                                        구글 계정으로 연동하기
                                    </button>
                                )}
                            </div>

                            <div className="bg-gray-50 p-4 rounded-2xl border-2 border-gray-200">
                                <p className="text-sm text-gray-700 font-bold mb-3 flex items-center gap-2"><span>🤖</span> AI 모델 상세 설정</p>
                                
                                {/* Model Selection */}
                                <label className="block text-xs font-bold text-gray-500 mb-1">사용할 AI 모델 선택</label>
                                <select 
                                    value={selectedModel}
                                    onChange={(e) => setSelectedModel(e.target.value)}
                                    className="w-full p-3 rounded-xl border-2 border-gray-200 bg-white focus:outline-none focus:border-pink-500 mb-4 text-sm text-gray-700 font-bold cursor-pointer"
                                >
                                    <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash (기본 / 빠름)</option>
                                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (고지능 / API 키 필요)</option>
                                </select>

                                <label className="block text-xs font-bold text-gray-500 mb-1">개인 API 키 입력</label>
                                <input
                                    type="password"
                                    placeholder="AIzaSy... (API 키를 붙여넣어주세요)"
                                    value={customApiKey}
                                    onChange={(e) => setCustomApiKey(e.target.value)}
                                    className="w-full p-3 rounded-xl border-2 border-gray-200 bg-white focus:outline-none focus:border-pink-500 mb-2 font-mono text-sm"
                                />
                                <p className="text-xs text-gray-400">
                                    * API 키는 브라우저에만 임시 보관되며 절대 서버에 저장되지 않아요!
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="w-full max-w-2xl text-center mb-8 fade-in">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-pink-500 mb-3 tracking-tight">
                            ✨ 초긍정 갸루식 사고 변환기 ✨
                        </h1>
                        <p className="text-lg text-pink-700 font-medium bg-white/60 inline-block px-4 py-2 rounded-full gyaru-shadow-sm">
                            우울하고 힘든 생각? 전부 갸루 파워로 튕겨내자구! 💖✌️
                        </p>
                    </header>

                    {/* Main Error */}
                    {error && (
                        <div className="mb-4 p-4 bg-red-100 text-red-600 rounded-2xl font-bold gyaru-shadow-sm border-2 border-red-300 w-full max-w-2xl text-center fade-in">
                            {error}
                        </div>
                    )}

                    {/* Input Section */}
                    <div className="w-full max-w-2xl bg-white rounded-3xl p-6 md:p-8 gyaru-shadow border-4 border-pink-300 mb-8 relative fade-in">
                        <div className="absolute -top-5 -left-5 text-4xl transform -rotate-12">🌺</div>
                        <div className="absolute -bottom-4 -right-4 text-4xl transform rotate-12">🎀</div>
                        
                        <label className="block text-xl font-bold text-pink-600 mb-4">
                            오늘 무슨 일 있었어? 자책하지 말고 다 털어놔봐! 👀
                        </label>
                        <textarea
                            className="w-full h-32 p-4 rounded-2xl border-2 border-pink-200 bg-pink-50 text-gray-800 placeholder-pink-300 focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-200 resize-none font-medium text-lg mb-4"
                            placeholder="ex) 오늘 너무 우울해... 계획한 일도 다 못 끝내고 또 시간을 낭비한 나 자신이 너무 한심해 ㅠㅠ"
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <button
                            onClick={handleConvert}
                            disabled={isLoading}
                            className={`w-full py-4 rounded-2xl font-bold text-xl text-white transition-all btn-press
                                ${isLoading ? 'bg-pink-300 cursor-not-allowed' : 'bg-gradient-to-r from-pink-400 to-rose-400 gyaru-shadow-sm hover:from-pink-500 hover:to-rose-500'}`}
                        >
                            {isLoading ? '✨ 갸루 파워 주입 중... ✨' : '갸루식으로 생각 바꾸기! ✌️💖'}
                        </button>
                    </div>

                    {/* Output Section */}
                    {outputText && (
                        <div className="w-full max-w-2xl bg-gradient-to-br from-yellow-50 to-pink-50 rounded-3xl p-6 md:p-8 gyaru-shadow border-4 border-yellow-300 mb-12 relative fade-in">
                            <div className="absolute -top-6 right-10 text-5xl">✨</div>
                            <h2 className="text-2xl font-extrabold text-yellow-600 mb-4 flex items-center gap-2">
                                <span>😎</span> 갸루의 초긍정 답변 도착!
                            </h2>
                            <div className="text-lg md:text-xl font-bold text-gray-800 leading-relaxed whitespace-pre-wrap mb-6">
                                {outputText}
                            </div>
                            <button
                                onClick={handleSave}
                                disabled={isSaving}
                                className={`w-full py-3 rounded-2xl font-bold text-lg text-yellow-900 border-2 transition-all btn-press
                                    ${isSaving ? 'bg-yellow-200 border-yellow-300 cursor-not-allowed' : 'bg-yellow-300 border-yellow-400 hover:bg-yellow-400 gyaru-shadow-sm'}`}
                            >
                                {isSaving ? '저장 중이야... 💾' : '이 긍정 에너지 다이어리에 킵하기! 💖'}
                            </button>
                        </div>
                    )}

                    {/* History Section */}
                    {savedThoughts.length > 0 && (
                        <div className="w-full max-w-2xl fade-in">
                            <h3 className="text-2xl font-bold text-pink-600 mb-6 flex items-center gap-2">
                                <span>📖</span> 내 반짝반짝 갸루 다이어리
                            </h3>
                            <div className="space-y-6">
                                {savedThoughts.map((thought) => (
                                    <div key={thought.id} className="bg-white rounded-3xl p-6 border-4 border-purple-200 gyaru-shadow relative group">
                                        <button 
                                            onClick={() => handleDelete(thought.id)}
                                            className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-red-100 text-red-500 hover:bg-red-200 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity font-bold"
                                            title="삭제하기"
                                        >
                                            ✕
                                        </button>
                                        <div className="mb-4 pb-4 border-b-2 border-dashed border-pink-100">
                                            <span className="text-sm font-bold text-purple-400 block mb-1">나의 고민 🌧️</span>
                                            <p className="text-gray-600 font-medium line-clamp-2">{thought.originalText}</p>
                                        </div>
                                        <div>
                                            <span className="text-sm font-bold text-pink-500 block mb-1">갸루식 변환 ✨</span>
                                            <p className="text-gray-800 font-bold leading-relaxed">{thought.gyaruText}</p>
                                        </div>
                                        <div className="mt-4 text-right">
                                            <span className="text-xs font-bold text-gray-400">
                                                {new Date(thought.createdAt).toLocaleString()}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
