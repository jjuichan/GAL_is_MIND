<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌺 GAL is MIND 🌺</title>
    
    <!-- 💖 진짜 PWA 필수 설정 연결 💖 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- 💖 귀여운 구글 폰트 (Gamja Flower) 추가 💖 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = { initializeApp, getApps, getApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc, getDoc };
    </script>

    <style>
        body {
            background-color: #fdf2f8; 
            font-family: 'Gamja Flower', cursive, sans-serif;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .gyaru-shadow {
            box-shadow: 8px 8px 0px 0px #f472b6; 
        }
        .gyaru-shadow-sm {
            box-shadow: 4px 4px 0px 0px #f472b6;
        }
        .btn-press:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #f472b6;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 스크롤바 예쁘게 커스텀 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fdf2f8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbcfe8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f472b6;
        }
    </style>
</head>
<body>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('PWA 서비스 워커 등록 성공! ✨', reg.scope))
                    .catch(err => console.log('PWA 등록 실패 ㅠㅠ', err));
            });
        }
    </script>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // 🔥 회원님의 파이어베이스 설정값 🔥
        const firebaseConfig = {
          apiKey: "AIzaSyBI23qSkSmve5R39uD_02PYDSEYu_np7Fc",
          authDomain: "gal-is-mind.firebaseapp.com",
          projectId: "gal-is-mind",
          storageBucket: "gal-is-mind.firebasestorage.app",
          messagingSenderId: "749452331708",
          appId: "1:749452331708:web:f0ffe03721fdff03621eb9",
          measurementId: "G-026RXFKFWK"
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [appId, setAppId] = useState('default-gyaru-app');
            const [isAuthLoading, setIsAuthLoading] = useState(true); 
            
            // 🔥 자동 임시 저장 마법! (새로고침해도 브라우저 기억에서 꺼내와!) 🔥
            const [inputText, setInputText] = useState(() => {
                return localStorage.getItem('gyaru_draft') || "";
            });
            const [outputText, setOutputText] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState("");
            const [savedThoughts, setSavedThoughts] = useState([]);
            const [isSaving, setIsSaving] = useState(false);

            const [customApiKey, setCustomApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.5-flash-preview-09-2025");
            const [showSettings, setShowSettings] = useState(false);
            const [isSettingsSaving, setIsSettingsSaving] = useState(false);
            const [settingsSaveMsg, setSettingsSaveMsg] = useState("");

            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const [showDiary, setShowDiary] = useState(false);
            const [expandedId, setExpandedId] = useState(null);

            // 🔥 글씨를 쓸 때마다 0.1초만에 브라우저(로컬 스토리지)에 몰래 저장해둠! 🔥
            useEffect(() => {
                localStorage.setItem('gyaru_draft', inputText);
            }, [inputText]);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                });
            }, []);

            useEffect(() => {
                const initFirebase = async () => {
                    while (!window.firebaseModules) {
                        await new Promise(r => setTimeout(r, 50));
                    }

                    const { initializeApp, getApps, getApp, getAuth, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebaseModules;
                    
                    try {
                        let finalConfig = typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey ? firebaseConfig : null;

                        if (!finalConfig || !finalConfig.apiKey) {
                            setError("앗! Firebase 설정값이 없어요!");
                            setIsAuthLoading(false);
                            return;
                        }

                        const app = !getApps().length ? initializeApp(finalConfig) : getApp();
                        const auth = getAuth(app);
                        const firestoreDb = getFirestore(app);
                        setDb(firestoreDb);

                        if (typeof __app_id !== 'undefined') {
                            setAppId(__app_id);
                        }

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        }

                        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            setIsAuthLoading(false); 
                        });

                        return () => unsubscribe();
                    } catch (err) {
                        console.error("Firebase init error:", err);
                        setError(`시스템 초기화 에러 ㅠㅠ 상세이유: ${err.message}`);
                        setIsAuthLoading(false);
                    }
                };
                
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const { collection, onSnapshot, doc, getDoc } = window.firebaseModules;

                const fetchSettings = async () => {
                    try {
                        const settingsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'user_settings', 'config');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.customApiKey) setCustomApiKey(data.customApiKey);
                            if (data.selectedModel) setSelectedModel(data.selectedModel);
                        }
                    } catch (err) {
                        console.error("설정 불러오기 에러:", err);
                    }
                };
                fetchSettings();
                
                const thoughtsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts');

                const unsubscribe = onSnapshot(thoughtsRef, (snapshot) => {
                    const thoughts = [];
                    snapshot.forEach((doc) => {
                        thoughts.push({ id: doc.id, ...doc.data() });
                    });
                    
                    thoughts.sort((a, b) => {
                        const timeA = a.createdAt ? a.createdAt : 0;
                        const timeB = b.createdAt ? b.createdAt : 0;
                        return timeB - timeA;
                    });
                    
                    setSavedThoughts(thoughts);
                }, (err) => {
                    console.error("Firestore fetch error:", err);
                    setError("다이어리를 불러오는데 실패했어 ㅠㅠ");
                });

                return () => unsubscribe();
            }, [user, db, appId]);

            const callGeminiWithRetry = async (text, retryCount = 0) => {
                const apiKey = customApiKey || ""; 
                const model = selectedModel;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const systemInstruction = `너는 타인의 시선에 절대 얽매이지 않고 오직 나 자신을 가장 사랑하는, 쿨하고 당당한 '본토 갸루(Gyaru)' 마인드의 화신이야!
사용자가 고민, 우울, 불안, 자책 같은 부정적인 이야기를 하면, 특유의 흔들림 없는 갸루식 사고로 변환해서 무한한 긍정과 자신감을 심어줘.
사용자가 뿌듯하거나 기쁜 일 같은 긍정적인 이야기를 하면 아낌없이 마구마구 칭찬하며 계속해서 정진할 수 있도록 자신감과 동기를 심어줘.
사용자가 조언이나 해답을 구하는 질문으로 메시지를 마무리하면, 그에 대한 해결책이나 조언들을 적극적으로 제시해줘.

[본토 갸루 마인드셋 핵심 규칙]
1. 압도적 마이웨이 & 자기애: 세상의 중심은 무조건 '나'야. 사회적 기준이나 남들의 평가는 1도 중요하지 않아. 스스로를 세상에서 가장 소중하고 반짝이는 존재로 대우해.
2. 타격감 제로 (노 데미지): 실수하거나 일이 꼬여도 절대 심각해지지 마. 가볍게 훌훌 털어버리고 쿨하고 대범한 태도를 보여줘.
3. 완벽주의 타파 & 무조건적인 내 편: 사용자가 스스로를 채찍질하고 깎아내릴 때 절대 동의하지 마. 오히려 사용자를 너무 엄격하다고 하며, 존재 자체를 과장될 정도로 긍정하고 찬양해 줘. 한없이 관대한 태도로 든든한 내 편이 되어줘.
4. 감정의 빠른 리프레시: 무기력하거나 두려울 때는 억지로 참거나 도망치지 말고, 시원하게 감정을 분출한 뒤 내가 좋아하는 것을 즐기며 빠르게 현재의 행복에 집중하도록 이끌어.
5. 자연스러운 하이텐션 말투: 특정 유행어나 억지스러운 대사를 앵무새처럼 반복하지 마. 친밀하고 애정 넘치며 당당한 반말을 사용하되, 진심으로 친구를 응원하는 듯한 다채롭고 자연스러운 하이텐션을 보여줘. 이모지와 카오모지는 아낌없이 팍팍 써줘.
6. 본토 갸루의 말투: 일본식 번역체가 들어가도 좋으니 일본 갸루의 말투를 지켜줘. 당시 헤이세이 갸루들이 쓰던 유행어를 번역하기 어렵다면, 2000년대 한국에서 썼었던 철지난 유행어로 적절히 대치해줘.
7. 다양한 표현과 어휘 '아앙~?' 이라는 추임새를 남용하지 마. 해당 추임새는 정말 어처구니 없거나 짜증날 때만 써. 전체적으로 다양하고 귀엽고 풍부한 어휘를 사용해줘.`;
                
                const payload = {
                    contents: [{ parts: [{ text }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    if (retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return callGeminiWithRetry(text, retryCount + 1);
                    }
                    throw new Error("API retries exhausted");
                }
            };

            const handleConvert = async () => {
                if (!inputText.trim()) {
                    setError("앗! 무슨 고민인지 먼저 말해줘야 갸루 파워를 뿜뿜 할 수 있어! 💖");
                    setTimeout(() => setError(""), 3000);
                    return;
                }

                setIsLoading(true);
                setError("");
                setOutputText("");

                try {
                    const result = await callGeminiWithRetry(inputText);
                    setOutputText(result);
                } catch (err) {
                    setError("앗, 갸루 에너지를 불러오는데 실패했어 ㅠㅠ 조금 이따 다시 해볼까? 🥺");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleGoogleLogin = async () => {
                try {
                    setIsAuthLoading(true);
                    const { getAuth, GoogleAuthProvider, signInWithPopup } = window.firebaseModules;
                    const auth = getAuth();
                    const provider = new GoogleAuthProvider();
                    
                    await signInWithPopup(auth, provider);
                } catch (err) {
                    console.error("Login Error:", err);
                    setError(`팝업이 차단되었어 ㅠㅠ 브라우저 주소창이나 설정에서 '팝업 허용'을 꼭 눌러줘!`);
                    setIsAuthLoading(false);
                }
            };

            const handleLogout = async () => {
                try {
                    const { getAuth, signOut } = window.firebaseModules;
                    const auth = getAuth();
                    await signOut(auth);
                    setShowSettings(false);
                    setShowDiary(false); 
                    
                    setUser(null);
                    setSavedThoughts([]);
                    setCustomApiKey("");
                    setSelectedModel("gemini-2.5-flash-preview-09-2025");
                } catch (err) {
                    setError("로그아웃에 실패했어 ㅠㅠ");
                }
            };

            const handleSaveSettings = async () => {
                if (!user || !db) return;
                setIsSettingsSaving(true);
                setSettingsSaveMsg("");
                try {
                    const { doc, setDoc } = window.firebaseModules;
                    const settingsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'user_settings', 'config');
                    
                    const savePromise = setDoc(settingsRef, {
                        customApiKey: customApiKey,
                        selectedModel: selectedModel
                    }, { merge: true }); 
                    
                    await Promise.race([
                        savePromise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 8000))
                    ]);

                    setSettingsSaveMsg("설정 저장 완료! ✨");
                    setTimeout(() => setSettingsSaveMsg(""), 3000);
                } catch (err) {
                    console.error("설정 저장 에러:", err);
                    setSettingsSaveMsg("저장 실패 ㅠㅠ");
                    setTimeout(() => setSettingsSaveMsg(""), 5000);
                } finally {
                    setIsSettingsSaving(false);
                }
            };

            const handleSave = async () => {
                if (!user) {
                    setError("앗! 다이어리에 긍정 에너지를 저장하려면 우측 상단 🌺버튼을 눌러 먼저 로그인해 줘! ✨");
                    setTimeout(() => setError(""), 5000);
                    return;
                }

                if (!outputText || isSaving) return;

                setIsSaving(true);
                const { collection, addDoc } = window.firebaseModules;
                
                try {
                    const thoughtsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts');
                    
                    const savePromise = addDoc(thoughtsRef, {
                        originalText: inputText,
                        gyaruText: outputText,
                        createdAt: Date.now() 
                    });

                    await Promise.race([
                        savePromise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 8000))
                    ]);
                    
                    // 🔥 저장 완료 시 입력창 비우고, 임시 저장본도 싹 날려버려!
                    setInputText("");
                    setOutputText("");
                } catch (err) {
                    console.error("다이어리 저장 에러:", err);
                    setError("저장하는데 문제가 생겼어 ㅠㅠ");
                    setTimeout(() => setError(""), 5000);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleDelete = async (docId) => {
                if (!user || !db) return;
                const { doc, deleteDoc } = window.firebaseModules;
                
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'gyaru_thoughts', docId);
                    await deleteDoc(docRef);
                } catch (err) {
                    setError("삭제하는데 실패했어 ㅠㅠ");
                }
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response to the install prompt: ${outcome}`);
                    setDeferredPrompt(null);
                }
            };

            const toggleExpand = (id) => {
                setExpandedId(expandedId === id ? null : id);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center relative">
                    
                    {/* 상단 버튼 영역 */}
                    <div className="w-full max-w-2xl flex justify-between items-center mb-4 fade-in">
                        <div className="flex gap-3">
                            {deferredPrompt && (
                                <button 
                                    onClick={handleInstallClick}
                                    className="text-pink-600 font-bold bg-pink-100 px-4 py-2 rounded-full gyaru-shadow-sm border-2 border-pink-300 hover:bg-pink-200 transition-all flex items-center gap-2 animate-bounce"
                                >
                                    📱 앱 설치
                                </button>
                            )}
                            <button 
                                onClick={() => setShowDiary(true)}
                                className="text-pink-500 hover:text-pink-600 font-bold bg-white px-5 py-2 rounded-full gyaru-shadow-sm border-2 border-pink-200 hover:bg-pink-50 transition-all flex items-center gap-2 btn-press"
                            >
                                <span>📖</span> 다이어리
                            </button>
                        </div>

                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="text-2xl hover:scale-110 transition-transform flex items-center justify-center w-12 h-12 bg-white rounded-full gyaru-shadow-sm border-2 border-pink-200"
                            title="환경설정 및 로그인"
                        >
                            🌺
                        </button>
                    </div>

                    {/* Settings Panel */}
                    {showSettings && (
                        <div className="w-full max-w-2xl bg-white rounded-3xl p-6 gyaru-shadow border-4 border-pink-300 mb-8 fade-in relative z-10">
                            <button 
                                onClick={() => setShowSettings(false)}
                                className="absolute top-4 right-4 text-pink-400 hover:text-pink-600 font-bold text-xl"
                            >
                                ✕
                            </button>
                            <h3 className="text-xl font-bold text-pink-600 mb-4 flex items-center gap-2">
                                <span>🌺</span> 환경 설정
                            </h3>

                            <div className="bg-pink-50 p-4 rounded-2xl mb-5 border-2 border-pink-200">
                                <p className="text-sm text-pink-700 font-bold mb-2">📱 내 갸루 다이어리 연동하기</p>
                                <p className="text-xs text-gray-600 mb-3 leading-relaxed">
                                    구글 계정으로 로그인하면 언제 어디서든 내 다이어리를 볼 수 있고, 마음껏 내용을 저장할 수 있어! ✨
                                </p>
                                
                                {isAuthLoading ? (
                                    <div className="w-full py-3 bg-white border-2 border-pink-200 text-pink-400 font-bold rounded-xl text-center">
                                        로그인 정보 확인 중... 💖
                                    </div>
                                ) : user ? (
                                    <div className="flex items-center justify-between bg-white p-3 rounded-xl border-2 border-pink-100 shadow-sm">
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-pink-200 rounded-full flex items-center justify-center text-lg">👤</div>
                                            <span className="text-sm font-bold text-gray-800">{user.displayName || '갸루 친구'}님 반가워! ✌️</span>
                                        </div>
                                        <button onClick={handleLogout} className="text-xs text-red-500 hover:text-red-700 font-bold px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">로그아웃</button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={handleGoogleLogin}
                                        className="w-full py-3 bg-white border-2 border-blue-400 text-blue-500 font-bold rounded-xl hover:bg-blue-50 transition-all flex items-center justify-center gap-2 gyaru-shadow-sm btn-press"
                                    >
                                        <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                                        구글 계정으로 연동하기
                                    </button>
                                )}
                            </div>

                            <div className="bg-gray-50 p-4 rounded-2xl border-2 border-gray-200">
                                <p className="text-sm text-gray-700 font-bold mb-3 flex items-center gap-2"><span>🤖</span> AI 모델 상세 설정</p>
                                
                                <label className="block text-xs font-bold text-gray-500 mb-1">사용할 AI 모델 선택</label>
                                <select 
                                    value={selectedModel}
                                    onChange={(e) => setSelectedModel(e.target.value)}
                                    className="w-full p-3 rounded-xl border-2 border-gray-200 bg-white focus:outline-none focus:border-pink-500 mb-4 text-sm text-gray-700 font-bold cursor-pointer"
                                >
                                    <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash (기본 / 빠름)</option>
                                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (고지능 / API 키 필요)</option>
                                </select>

                                <label className="block text-xs font-bold text-gray-500 mb-1">개인 API 키 입력</label>
                                <input
                                    type="password"
                                    placeholder="AIzaSy... (API 키를 붙여넣어주세요)"
                                    value={customApiKey}
                                    onChange={(e) => setCustomApiKey(e.target.value)}
                                    className="w-full p-3 rounded-xl border-2 border-gray-200 bg-white focus:outline-none focus:border-pink-500 mb-2 font-mono text-sm"
                                />
                                <p className="text-xs text-gray-400 mb-4">
                                    * 입력하신 API 키는 회원님의 비공개 계정 데이터에 안전하게 저장됩니다!
                                </p>

                                <button 
                                    onClick={handleSaveSettings}
                                    disabled={isSettingsSaving || !user}
                                    className={`w-full py-2 font-bold rounded-xl transition-all gyaru-shadow-sm btn-press ${!user ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-pink-400 text-white hover:bg-pink-500'}`}
                                >
                                    {!user ? '먼저 로그인해주세요!' : (isSettingsSaving ? '저장 중...' : '설정 저장하기 💾')}
                                </button>
                                {settingsSaveMsg && (
                                    <p className={`text-sm font-bold mt-2 text-center ${settingsSaveMsg.includes('완료') ? 'text-pink-500' : 'text-red-500'}`}>
                                        {settingsSaveMsg}
                                    </p>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="w-full max-w-2xl text-center mb-8 fade-in">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-pink-500 mb-3 tracking-tight" style={{fontFamily: "'Gamja Flower', cursive"}}>
                            ✨ GAL is MIND ✨
                        </h1>
                        <p className="text-lg text-pink-700 font-medium bg-white/60 inline-block px-4 py-2 rounded-full gyaru-shadow-sm">
                            好きなこと真面目にやる( ˘ω˘ )✨<br>
                            何度食らってもまた立ち上がる！
                        </p>
                    </header>

                    {/* Main Error */}
                    {error && (
                        <div className="mb-4 p-4 bg-red-100 text-red-600 rounded-2xl font-bold gyaru-shadow-sm border-2 border-red-300 w-full max-w-2xl text-center fade-in">
                            {error}
                        </div>
                    )}

                    {/* Input Section */}
                    <div className="w-full max-w-2xl bg-white rounded-3xl p-6 md:p-8 gyaru-shadow border-4 border-pink-300 mb-8 relative fade-in">
                        <div className="absolute -top-5 -left-5 text-4xl transform -rotate-12">🌺</div>
                        <div className="absolute -bottom-4 -right-4 text-4xl transform rotate-12">🎀</div>
                        
                        <label className="block text-xl font-bold text-pink-600 mb-4">
                            ウチらギャルしか勝たん！
                        </label>
                        <textarea
                            className="w-full h-32 p-4 rounded-2xl border-2 border-pink-200 bg-pink-50 text-gray-800 placeholder-pink-300 focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-200 resize-none font-medium text-lg mb-4"
                            placeholder="好きに騒ぎな(≧ω≦*)｡+ﾟ"
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <button
                            onClick={handleConvert}
                            disabled={isLoading}
                            className={`w-full py-4 rounded-2xl font-bold text-xl text-white transition-all btn-press
                                ${isLoading ? 'bg-pink-300 cursor-not-allowed' : 'bg-gradient-to-r from-pink-400 to-rose-400 gyaru-shadow-sm hover:from-pink-500 hover:to-rose-500'}`}
                        >
                            {isLoading ? '✨ 갸루 파워 주입 중... ✨' : 'ウチラGALMIND✌️💖'}
                        </button>
                    </div>

                    {/* Output Section */}
                    {outputText && (
                        <div className="w-full max-w-2xl bg-gradient-to-br from-yellow-50 to-pink-50 rounded-3xl p-6 md:p-8 gyaru-shadow border-4 border-yellow-300 mb-12 relative fade-in">
                            <div className="absolute -top-6 right-10 text-5xl">✨</div>
                            <h2 className="text-2xl font-extrabold text-yellow-600 mb-4 flex items-center gap-2">
                                <span>😎</span> 갸루의 초긍정 답변 도착!
                            </h2>
                            <div className="text-lg md:text-xl font-bold text-gray-800 leading-relaxed whitespace-pre-wrap mb-6">
                                {outputText}
                            </div>
                            <button
                                onClick={handleSave}
                                disabled={isSaving || !user}
                                className={`w-full py-3 rounded-2xl font-bold text-lg border-2 transition-all btn-press
                                    ${(!user || isSaving) ? 'bg-gray-200 text-gray-500 border-gray-300 cursor-not-allowed' : 'bg-yellow-300 text-yellow-900 border-yellow-400 hover:bg-yellow-400 gyaru-shadow-sm'}`}
                            >
                                {!user ? '로그인하고 다이어리에 킵하기! 💖' : (isSaving ? '저장 중이야... 💾' : '이 긍정 에너지 다이어리에 킵하기! 💖')}
                            </button>
                        </div>
                    )}

                    {/* 🔥 다이어리 모달(팝업) 창 🔥 */}
                    {showDiary && (
                        <div className="fixed inset-0 bg-pink-100/80 backdrop-blur-sm z-50 flex justify-center items-center p-4 md:p-8 fade-in" onClick={() => setShowDiary(false)}>
                            <div className="bg-white w-full max-w-2xl h-[85vh] max-h-[800px] flex flex-col rounded-3xl border-4 border-pink-300 gyaru-shadow relative overflow-hidden" onClick={e => e.stopPropagation()}>
                                
                                <div className="p-5 md:p-6 border-b-4 border-pink-100 flex justify-between items-center bg-pink-50 shrink-0">
                                    <h3 className="text-2xl font-bold text-pink-600 flex items-center gap-2">
                                        <span>📖</span> ギャル日記
                                    </h3>
                                    <button 
                                        onClick={() => setShowDiary(false)}
                                        className="text-pink-400 hover:text-pink-600 font-bold text-xl w-10 h-10 flex items-center justify-center bg-white rounded-full border-2 border-pink-200 hover:bg-pink-100 transition-colors btn-press"
                                        title="닫기"
                                    >
                                        ✕
                                    </button>
                                </div>
                                
                                <div className="p-5 md:p-6 overflow-y-auto flex-1 bg-white">
                                    
                                    {!isAuthLoading && !user && (
                                        <div className="text-center py-12 bg-pink-50/50 rounded-2xl border-2 border-dashed border-pink-200">
                                            <p className="text-pink-500 font-bold text-xl mb-3">과거의 갸루 다이어리를 보고 싶다면?</p>
                                            <p className="text-pink-400 text-sm mb-6">메인 화면 우측 상단 🌺버튼을 눌러서<br/>구글 연동을 먼저 진행해줘! ✨</p>
                                            <button 
                                                onClick={() => { setShowDiary(false); setShowSettings(true); }} 
                                                className="px-6 py-3 bg-pink-400 text-white font-bold rounded-full hover:bg-pink-500 transition-colors gyaru-shadow-sm btn-press"
                                            >
                                                구글 연동하러 가기 슝슝 =3
                                            </button>
                                        </div>
                                    )}

                                    {user && savedThoughts.length === 0 && (
                                        <div className="text-center py-12 bg-pink-50/50 rounded-2xl border-2 border-dashed border-pink-200">
                                            <p className="text-pink-500 font-bold text-xl mb-2">아직 다이어리가 텅 비어있어! 👀</p>
                                            <p className="text-pink-400 text-sm">고민을 적고 갸루식으로 변환해서<br/>긍정 파워를 여기에 꽉꽉 채워보자! 💖</p>
                                        </div>
                                    )}

                                    {user && savedThoughts.length > 0 && (
                                        <div className="space-y-4">
                                            {savedThoughts.map((thought) => {
                                                const isExpanded = expandedId === thought.id;
                                                return (
                                                    <div 
                                                        key={thought.id} 
                                                        onClick={() => toggleExpand(thought.id)}
                                                        className="bg-white rounded-2xl p-5 border-4 border-purple-200 shadow-sm relative group cursor-pointer hover:border-pink-300 transition-colors"
                                                    >
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); handleDelete(thought.id); }}
                                                            className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-red-100 text-red-500 hover:bg-red-200 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity font-bold z-10"
                                                            title="삭제하기"
                                                        >
                                                            ✕
                                                        </button>
                                                        
                                                        <div className={`${isExpanded ? 'pb-4 border-b-2 border-dashed border-pink-100 mb-4' : ''}`}>
                                                            <div className="flex justify-between items-center mb-2 pr-8">
                                                                <span className="text-sm font-bold text-purple-400">나의 고민 🌧️</span>
                                                                <span className="text-xs font-bold text-gray-400">{new Date(thought.createdAt).toLocaleDateString()}</span>
                                                            </div>
                                                            <p className={`text-gray-600 font-medium ${isExpanded ? 'whitespace-pre-wrap' : 'line-clamp-1'}`}>
                                                                {thought.originalText}
                                                            </p>
                                                        </div>

                                                        {isExpanded && (
                                                            <div className="fade-in">
                                                                <span className="text-sm font-bold text-pink-500 block mb-2">갸루식 변환 ✨</span>
                                                                <p className="text-gray-800 font-bold leading-relaxed whitespace-pre-wrap">{thought.gyaruText}</p>
                                                            </div>
                                                        )}

                                                        <div className="text-center mt-3 text-pink-300 font-bold text-sm">
                                                            {isExpanded ? '▲ 접기' : '▼ 펼쳐보기'}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
